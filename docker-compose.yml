version: '3.8'

services:
  db:
    image: mariadb:11
    container_name: fitwin-db
    environment:
      MYSQL_ROOT_PASSWORD: fitwin2024
      MYSQL_DATABASE: fit_win
    volumes:
      - fitwin-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./ApiUsuarios
    container_name: fitwin-api
    ports:
      - "3036:3036"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mariadb://db:3306/fit_win
      DB_USER: root
      DB_PASSWORD: fitwin2024
      JWT_SECRET: a31b2c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b1c2d3e4f5a6b7c8d9e0f1a2b
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -o /dev/null -w '%{http_code}' -X POST http://localhost:3036/api/v1/FWBBD/usuarios/login -H 'Content-Type: application/json' -d '{}' | grep -E '^[0-9]'"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 45s

  seeder:
    build: ./docker/seeder
    container_name: fitwin-seeder
    depends_on:
      api:
        condition: service_healthy
    restart: "no"

volumes:
  fitwin-data:
