# Database
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mariadb://localhost:3306/fit_win}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect

# Server
server.port=3036
server.error.include-message=never
server.error.include-binding-errors=never

# Create database if it doesn't exist
spring.sql.init.mode=always

# Logging
logging.level.org.springframework.jdbc=INFO

# Jackson - serializar fechas como ISO string, no como arrays
spring.jackson.serialization.write-dates-as-timestamps=false

# Disable Spring Boot caching
spring.jpa.properties.hibernate.bytecode.check=false
spring.jpa.properties.hibernate.bytecode.use-reflection=false

# --- CONFIGURACION JWT ---
# JWT_SECRET es obligatorio. Debe ser un valor Base64 de al menos 32 bytes.
security.jwt.secret-key=${JWT_SECRET}
security.jwt.expiration-time=86400000

# --- REFRESH TOKEN ---
security.refresh-token.expiration-ms=2592000000
