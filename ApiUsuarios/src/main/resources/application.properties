# Database
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.url=jdbc:mariadb://localhost:3306/fit_win
spring.datasource.username=root
spring.datasource.password=root

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect

# Server
server.port=3036

# Create database if it doesn't exist
spring.sql.init.mode=always

# Logging
logging.level.org.springframework.jdbc=DEBUG

# Disable Spring Boot caching
spring.jpa.properties.hibernate.bytecode.check=false
spring.jpa.properties.hibernate.bytecode.use-reflection=false

# --- CONFIGURACION JWT ---
security.jwt.secret-key=a31b2c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b1c2d3e4f5a6b7c8d9e0f1a2b
security.jwt.expiration-time=86400000
